<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tonechroma</title>
    <script>
      // GitHub Pages has no server-side routing, so a direct visit to a route
      // like /support gets served this 404 page. Encode the real path into a
      // query string and redirect to index.html, which decodes it back before
      // the app mounts (see the script in index.html).
      var pathSegmentsToKeep = 0; // served from domain root (custom domain)
      var l = window.location;
      var segments = l.pathname.split("/");
      var basePath = segments.slice(0, 1 + pathSegmentsToKeep).join("/");
      var rest = segments.slice(1 + pathSegmentsToKeep).join("/");
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        basePath + "/?/" + rest.replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
